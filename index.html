<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Atividade: Construtor Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <style>
       
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow: hidden;
        }

        
        #carouselExampleDark {
            flex-grow: 1;
        }

        
        .carousel-inner, .carousel-item {
            height: 100%;
        }

       
        .carousel-item img {
            height: 100%;
            width: 100%;
            object-fit: cover;
            background-color: #333;
        }

       
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 0;
            z-index: 10;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Minha Marca</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
           
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Serviços</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">Contato</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Pesquisar..." aria-label="Search"/>
                    <button class="btn btn-outline-success" type="submit">Buscar</button>
                </form>
            </div>
        </div>
    </nav>

    <div id="carouselExampleDark" class="carousel carousel-dark slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="2" aria-label="Slide 3"></button>
        </div>
       
        <div class="carousel-inner">
            <div class="carousel-item active" data-bs-interval="10000">
                <img src="brr.jpeg" class="d-block w-100" alt="Imagem 1">
                <div class="carousel-caption d-none d-md-block text-white">
                    <h5 class="bg-dark d-inline-block px-3 py-1 rounded">Primeiro Slide</h5>
                </div>
            </div>
            <div class="carousel-item" data-bs-interval="2000">
                <img src="br.webp" class="d-block w-100" alt="Imagem 2">
                <div class="carousel-caption d-none d-md-block text-white">
                    <h5 class="bg-dark d-inline-block px-3 py-1 rounded">Segundo Slide</h5>
                </div>
            </div>
            <div class="carousel-item">
                <img src="endrick.jpg" class="d-block w-100" alt="Imagem 3">
                <div class="carousel-caption d-none d-md-block text-white">
                    <h5 class="bg-dark d-inline-block px-3 py-1 rounded">Terceiro Slide</h5>
                </div>
            </div>
        </div>
       
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Próximo</span>
        </button>
    </div>

    <footer class="text-center">
        <div class="container">
            <p class="mb-0">Meu Primeiro Site &copy; 2026. <small>Desenvolvido com dedicação.</small></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
